              - paragraph [ref=e43427]: A minor earthquake of magnitude 1.2 occurred 7 km northwest of The Geysers, California on June 11, 2026 at 19:20 UTC. The seismic event was recorded by USGS Earthquakes and has a low severity rating.
            - generic [ref=e43428]:
              - heading "Likely impact considerations" [level=3] [ref=e43429]
              - paragraph [ref=e43430]: Due to its low magnitude, shaking is likely imperceptible or felt only weakly near the epicenter. No significant damage to infrastructure or risk to public safety is expected. Potential minor aftershocks might occur but are expected to be similarly low in intensity.
            - generic [ref=e43431]:
              - heading "Response Priority Recommendation" [level=3] [ref=e43432]
              - paragraph [ref=e43433]: No emergency response is necessary given the minor severity. Public advisories can note the event for situational awareness without raising alarm. Monitor for any seismic activity increases to update assessments accordingly.
            - generic [ref=e43434]:
              - heading "Uncertainty Note" [level=3] [ref=e43435]
              - list [ref=e43436]:
