              - heading "Situation summary" [level=3] [ref=e107606]
              - paragraph [ref=e107607]: A strong Heat Advisory has been issued by NWS Seattle WA starting June 14 at 11:00 AM PDT through June 16 at 10:00 PM PDT, signaling a period of unusually high temperatures expected in the region.
            - generic [ref=e107608]:
              - heading "Likely impact considerations" [level=3] [ref=e107609]
              - paragraph [ref=e107610]: Increased risk of heat-related illnesses such as heat exhaustion and heat stroke, especially among vulnerable populations (elderly, children, and those with preexisting health conditions). Higher demand on electrical grids due to increased use of air conditioning, potentially leading to power outages. Outdoor work and recreational activities may pose health risks due to extreme heat. Possible impact on local ecosystems and increased risk of wildfires due to dry and hot conditions.
            - generic [ref=e107611]:
              - heading "Response Priority Recommendation" [level=3] [ref=e107612]
              - paragraph [ref=e107613]: Ensure availability of cooling centers and communicate their locations to the public. Advise residents to stay hydrated, avoid strenuous outdoor activities during peak heat hours, and check on vulnerable neighbors. Prepare local health services to identify and treat heat-related illnesses promptly. Encourage utility companies to monitor grid loads and implement measures to prevent outages.
